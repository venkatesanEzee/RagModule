spring.application.name=ragModule

server.port = 8081
storage.root-path=./uploaded-documents

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/rag_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Don't fail startup if DB is temporarily unavailable
spring.datasource.hikari.initialization-fail-timeout=0

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Ollama
ollama.base-url=http://localhost:11434
ollama.chat-model=qwen3:8b
ollama.embedding-model=nomic-embed-text
# Limit generated tokens (lower = faster); increase if answers get cut off
ollama.num-predict=512
# Context window: keep small to reduce prefill time (must fit prompt + num-predict)
ollama.num-ctx=2048

# Qdrant
qdrant.base-url=http://localhost:6333
qdrant.collection-name=documents

# Chunking
chunking.chunk-size=500
chunking.chunk-overlap=50